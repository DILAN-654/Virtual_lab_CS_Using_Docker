services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/virtual-lab-workbench
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_ENABLED: ${AI_ENABLED:-true}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.3-codex}
      OPENAI_FALLBACK_MODEL: ${OPENAI_FALLBACK_MODEL:-gpt-5-mini}
      PY_RUNNER_IMAGE: ${PY_RUNNER_IMAGE:-python:3.11-slim}
      JS_RUNNER_IMAGE: ${JS_RUNNER_IMAGE:-node:20-alpine}
      JAVA_RUNNER_IMAGE: ${JAVA_RUNNER_IMAGE:-eclipse-temurin:21-jdk}
      C_RUNNER_IMAGE: ${C_RUNNER_IMAGE:-gcc:13}
      CPP_RUNNER_IMAGE: ${CPP_RUNNER_IMAGE:-gcc:13}
    volumes:
      # Persist uploads across container restarts
      - backend_uploads:/usr/src/app/uploads
      # Allow dockerode to manage lab/code-runner containers
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  mongo_data:
  backend_uploads:
